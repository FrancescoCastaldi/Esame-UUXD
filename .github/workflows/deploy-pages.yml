name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'Website - Finale/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check HTML files exist
        run: |
          echo "=== Checking Website - Finale structure ==="
          ls -la "Website - Finale/"
          echo "=== HTML files ==="
          find "Website - Finale/" -name "*.html" | wc -l
          echo "=== JS files ==="
          find "Website - Finale/" -name "*.js" | wc -l

      - name: Validate HTML (tidy)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq tidy
          for f in Website\ - Finale/*.html; do
            echo "Checking $(basename "$f")..."
            tidy -q -e "$f" 2>/dev/null || true
          done
          echo "Validation complete (warnings are non-blocking)"

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'Website - Finale'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
